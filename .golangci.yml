version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable:
        - atomic
        - bools
        - copylocks
        - httpresponse
        - lostcancel
        - nilfunc
        - printf
        - shift
        - structtag
        - tests
        - unmarshal
        - unreachable
        - unusedresult
    misspell:
      locale: US
