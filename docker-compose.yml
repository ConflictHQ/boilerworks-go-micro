services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: boilerworks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "postgres://postgres:postgres@postgres:5432/boilerworks?sslmode=disable",
        "up",
      ]

  api:
    build: .
    ports:
      - "8000:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/boilerworks?sslmode=disable
      PORT: "8080"
      API_KEY_SEED: bw_seed_key_change_me_in_production
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pgdata:
